version: "3.9"

services:
  rust-hft-arb:
    build: .
    container_name: hft-arb
    restart: unless-stopped
    ports:
      - "9090:9090"   # Prometheus metrics
    volumes:
      - ./config.toml:/app/config.toml:ro
      - ./state.json:/app/state.json
      - hft-logs:/var/log/hft
    environment:
      - RUST_LOG=info
      - RUST_BACKTRACE=1
    # Pin to a single CPU core for deterministic latency.
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    # Security hardening.
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: hft-prometheus
    restart: unless-stopped
    ports:
      - "9091:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"

  grafana:
    image: grafana/grafana:11.3.0
    container_name: hft-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    environment:
      # ── Auth hardening: disable anonymous access, require login ──
      - GF_AUTH_ANONYMOUS_ENABLED=false
      # Admin credentials (override via .env or Docker secrets in production).
      # These are weak defaults for local dev — change before exposing to
      # any network beyond localhost.
      - GF_SECURITY_ADMIN_USER=${GF_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:-changeme}
      # Disable the "try Grafana Cloud" upsell on login page.
      - GF_USERS_ALLOW_SIGN_UP=false

volumes:
  hft-logs:
  prometheus-data:
  grafana-data: